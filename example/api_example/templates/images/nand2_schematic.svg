<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200" font-family="monospace" font-size="13">
  <!-- Background -->
  <rect width="320" height="200" fill="#1a1a2e" rx="8"/>

  <!-- Title -->
  <text x="160" y="22" text-anchor="middle" fill="#e0e0e0" font-size="14" font-weight="bold">NAND2_X1</text>

  <!-- NAND body: D-shape -->
  <path d="M 100,55 L 100,145 L 140,145 A 45,45 0 0 0 140,55 Z"
        fill="none" stroke="#4fc3f7" stroke-width="2.5"/>

  <!-- Bubble (inversion circle) -->
  <circle cx="192" cy="100" r="7" fill="none" stroke="#4fc3f7" stroke-width="2.5"/>

  <!-- Input A wire -->
  <line x1="50" y1="75" x2="100" y2="75" stroke="#a5d6a7" stroke-width="2"/>
  <text x="42" y="79" text-anchor="end" fill="#a5d6a7">A</text>

  <!-- Input B wire -->
  <line x1="50" y1="125" x2="100" y2="125" stroke="#a5d6a7" stroke-width="2"/>
  <text x="42" y="129" text-anchor="end" fill="#a5d6a7">B</text>

  <!-- Output wire (after bubble) -->
  <line x1="199" y1="100" x2="260" y2="100" stroke="#ef9a9a" stroke-width="2"/>
  <text x="268" y="104" fill="#ef9a9a">ZN</text>

  <!-- Input dots -->
  <circle cx="100" cy="75"  r="3.5" fill="#a5d6a7"/>
  <circle cx="100" cy="125" r="3.5" fill="#a5d6a7"/>

  <!-- Area label -->
  <text x="160" y="185" text-anchor="middle" fill="#90a4ae" font-size="11">Area: 0.42 μm²  |  Process: 5nm FinFET</text>
</svg>
