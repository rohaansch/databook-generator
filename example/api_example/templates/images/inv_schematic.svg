<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200" font-family="monospace" font-size="13">
  <!-- Background -->
  <rect width="320" height="200" fill="#1a1a2e" rx="8"/>

  <!-- Title -->
  <text x="160" y="22" text-anchor="middle" fill="#e0e0e0" font-size="14" font-weight="bold">INV_X1</text>

  <!-- Inverter triangle body -->
  <polygon points="100,60 100,140 165,100"
           fill="none" stroke="#4fc3f7" stroke-width="2.5"/>

  <!-- Bubble (inversion circle) -->
  <circle cx="172" cy="100" r="7" fill="none" stroke="#4fc3f7" stroke-width="2.5"/>

  <!-- Input A wire -->
  <line x1="50" y1="100" x2="100" y2="100" stroke="#a5d6a7" stroke-width="2"/>
  <text x="42" y="104" text-anchor="end" fill="#a5d6a7">A</text>

  <!-- Output wire (after bubble) -->
  <line x1="179" y1="100" x2="260" y2="100" stroke="#ef9a9a" stroke-width="2"/>
  <text x="268" y="104" fill="#ef9a9a">ZN</text>

  <!-- Input dot -->
  <circle cx="100" cy="100" r="3.5" fill="#a5d6a7"/>

  <!-- Area label -->
  <text x="160" y="185" text-anchor="middle" fill="#90a4ae" font-size="11">Area: 0.21 μm²  |  Process: 5nm FinFET</text>
</svg>
